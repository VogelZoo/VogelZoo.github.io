<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VogelZoo | Ring Generator</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="page-shell tool-shell">
    <section class="tool-panel" aria-label="Ring generator controls">
      <h1>Ring generator</h1>
      <p>Adjust ring size, width, thickness, comfort fit, and bevel to preview a 2D cross-section and export an STL.</p>
      <label>
        Ring Size (US)
        <input type="number" id="size" min="4" max="15" step="0.1" value="10">
      </label>
      <label>
        Width (mm)
        <input type="number" id="width" min="2" max="12" step="0.1" value="8">
      </label>
      <label>
        Thickness (mm)
        <input type="number" id="thickness" min="1.5" max="4" step="0.1" value="2.2">
      </label>
      <label>
        Comfort Fit: <span id="comfortfitLabel"></span> (ratio)
        <input type="range" id="comfort" min="0" max="0.5" step="0.01" value="0.35">
      </label>
      <label>
        Bevel Size: <span id="bevelsizeLabel"></span> mm
        <input type="range" id="bevel" min="0" max="1" step="0.01" value="0.4">
      </label>
      <button id="exportBtn" type="button">Export STL</button>
    </section>

    <section class="view-column">
      <div class="view-panel">
        <div class="view-header">2D Profile</div>
        <canvas id="profile2d" width="420" height="380"></canvas>
      </div>
      <div class="view-panel">
        <div class="view-header">3D View</div>
        <div id="render3d"></div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../../assets/js/global.js" defer></script>
  <script type="module" src="app.js" defer></script>
</body>
</html>
